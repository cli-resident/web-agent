name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt', 'cmake/Dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DWA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Copy DLLs next to tests (Windows)
        if: runner.os == 'Windows'
        run: |
          $target = "$Env:GITHUB_WORKSPACE\build\tests\Debug"
          if (!(Test-Path $target)) { New-Item -ItemType Directory -Path $target | Out-Null }
          Get-ChildItem -Path "$Env:GITHUB_WORKSPACE\build" -Recurse -Filter *.dll | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $target -Force
          }
          echo $target | Out-File -FilePath $Env:GITHUB_PATH -Encoding utf8 -Append

      - name: Dump wa_tests dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\14.44.35207\bin\Hostx64\x64\dumpbin.exe" /DEPENDENTS "$Env:GITHUB_WORKSPACE\build\tests\Debug\wa_tests.exe"

      - name: Try running wa_tests manually (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build\tests\Debug
          ./wa_tests.exe || exit 0

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure --build-config Debug

      - name: Upload web_agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_agent-${{ matrix.os }}
          path: |
            build/web_agent
            build/Debug/web_agent.exe
          if-no-files-found: ignore
